<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Materi Kursus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- FORM SECTION -->
        <div class="bg-white p-6 rounded-lg shadow h-fit">
            <h2 id="form-title" class="text-xl font-bold mb-4">Tambah Course Baru</h2>
            <form id="course-form" onsubmit="saveCourse(event)">
                <input type="hidden" id="course-id">
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Judul Course</label>
                    <input type="text" id="title" required class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Nama Pembuat</label>
                    <input type="text" id="creator" required class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Deskripsi</label>
                    <textarea id="description" required rows="3" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                
                <div class="mb-4" id="video-input-group">
                    <label class="block text-sm font-medium text-gray-700">File Video (MP4)</label>
                    <input type="file" id="video" accept="video/mp4" class="mt-1 w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                
                <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition disabled:bg-blue-300 disabled:cursor-not-allowed">
                    Simpan Course
                </button>
                <button type="button" id="btn-cancel" onclick="resetForm()" class="hidden w-full mt-2 bg-gray-400 text-white p-2 rounded hover:bg-gray-500 transition">
                    Batal Edit
                </button>
            </form>
            <p id="status-msg" class="text-sm mt-3 font-semibold"></p>
        </div>

        <!-- LIST & DETAIL SECTION -->
        <div class="md:col-span-2 space-y-6">
            <h2 class="text-2xl font-bold text-gray-800">Daftar Materi Kursus</h2>
            
            <!-- VIDEO PLAYER DETAIL -->
            <div id="detail-section" class="hidden bg-white p-6 rounded-lg shadow border border-blue-200">
                <h3 id="detail-title" class="text-xl font-bold text-blue-600 mb-1"></h3>
                <p id="detail-creator" class="text-sm text-gray-500 mb-4"></p>
                
                <div class="relative w-full overflow-hidden rounded-lg mb-4" style="padding-top: 56.25%;">
                    <iframe 
                        id="course-player-iframe" 
                        src="" 
                        loading="lazy" 
                        class="absolute top-0 left-0 w-full h-full border-0"
                        allow="accelerometer; gyroscope; autocomplete; encrypted-media; picture-in-picture;" 
                        allowfullscreen="true">
                    </iframe>
                </div>
                
                <h4 class="font-semibold text-gray-700">Deskripsi:</h4>
                <p id="detail-desc" class="text-gray-600 text-sm mt-1 whitespace-pre-line"></p>
            </div>

            <!-- COURSE GRID LIST -->
            <div id="course-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl">
            <h3 class="text-lg font-bold text-gray-900">Konfirmasi Hapus</h3>
            <p class="text-gray-500 text-sm mt-2">Apakah Anda yakin ingin menghapus course ini? Video dan seluruh file segmen juga akan dihapus permanen.</p>
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-200 rounded text-gray-700 hover:bg-gray-300 transition">Batal</button>
                <button id="confirm-delete-btn" class="px-4 py-2 bg-red-600 rounded text-white hover:bg-red-700 transition">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/courses";
        let targetDeleteId = null;
        let activeCourses = [];

        document.addEventListener("DOMContentLoaded", loadCourses);

        function loadCourses() {
            fetch(API_URL)
                .then(res => {
                    if (!res.ok) throw new Error("Gagal mengambil data dari server");
                    return res.json();
                })
                .then(data => {
                    const list = document.getElementById("course-list");
                    list.innerHTML = "";
                    if (!data || data.length === 0) {
                        list.innerHTML = `<div class="col-span-full text-center text-gray-500 py-8">Belum ada course terdaftar.</div>`;
                        return;
                    }
                    
                    activeCourses = data;

                    data.forEach((c, index) => {
                        list.innerHTML += `
                            <div class="bg-white rounded-lg shadow overflow-hidden border hover:border-blue-400 transition cursor-pointer flex flex-col justify-between" onclick="showDetail(${index})">
                                <div class="p-4">
                                    <h3 class="font-bold text-lg text-gray-800 truncate">${escapeHtml(c.title)}</h3>
                                    <p class="text-sm text-gray-500">Oleh: ${escapeHtml(c.creator)}</p>
                                    <p class="text-xs text-gray-400 mt-1 line-clamp-2">${escapeHtml(c.description)}</p>
                                </div>
                                <div class="p-4 pt-0 flex justify-end space-x-2" onclick="event.stopPropagation();">
                                    <button onclick="editForm(${index})" class="text-xs bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600 transition">Edit</button>
                                    <button onclick="openDeleteModal(${c.id})" class="text-xs bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 transition">Hapus</button>
                                </div>
                            </div>
                        `;
                    });
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("course-list").innerHTML = `<div class="col-span-full text-center text-red-500 py-8">Gagal memuat data kursus.</div>`;
                });
        }

        function showDetail(index) {
            const course = activeCourses[index];
            if (!course) return;

            document.getElementById("detail-section").classList.remove("hidden");
            document.getElementById("detail-title").textContent = course.title;
            document.getElementById("detail-creator").textContent = "Pembuat: " + course.creator;
            document.getElementById("detail-desc").textContent = course.description;
            
            const iframePlayer = document.getElementById("course-player-iframe");
            iframePlayer.src = course.video_url;
            
            document.getElementById("detail-section").scrollIntoView({ behavior: 'smooth' });
        }

        function saveCourse(e) {
            e.preventDefault();
            const id = document.getElementById("course-id").value;
            const status = document.getElementById("status-msg");
            const btnSubmit = document.getElementById("btn-submit");
            
            const formData = new FormData();
            formData.append("title", document.getElementById("title").value);
            formData.append("creator", document.getElementById("creator").value);
            formData.append("description", document.getElementById("description").value);

            let method = "POST";
            let url = API_URL;

            if (id) {
                method = "PUT";
                url = `${API_URL}/${id}`;
                status.style.color = "#2563eb";
                status.textContent = "Sedang memperbarui info course...";
            } else {
                const videoInput = document.getElementById("video");
                if (!videoInput.files[0]) {
                    alert("File video wajib dipilih untuk membuat course baru!");
                    return;
                }
                formData.append("video", videoInput.files[0]);
                status.style.color = "#2563eb";
                status.textContent = "Mengunggah & memproses video HLS di Bunny Stream... Silakan tunggu beberapa saat.";
            }

            btnSubmit.disabled = true;

            fetch(url, { method: method, body: formData })
                .then(async res => {
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.error || "Gagal menyimpan course");
                    }
                    return data;
                })
                .then(res => {
                    status.style.color = "#10b981";
                    status.textContent = res.message || "Berhasil diproses!";
                    resetForm();
                    loadCourses();
                })
                .catch(err => {
                    status.style.color = "#ef4444";
                    status.textContent = "Error: " + err.message;
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                });
        }

        function editForm(index) {
            const course = activeCourses[index];
            if (!course) return;

            document.getElementById("form-title").textContent = "Edit Info Course";
            document.getElementById("course-id").value = course.id;
            document.getElementById("title").value = course.title;
            document.getElementById("creator").value = course.creator;
            document.getElementById("description").value = course.description;
            
            document.getElementById("video-input-group").classList.add("hidden");
            document.getElementById("btn-cancel").classList.remove("hidden");
            document.getElementById("status-msg").textContent = "";
            
            document.getElementById("course-form").scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById("form-title").textContent = "Tambah Course Baru";
            document.getElementById("course-id").value = "";
            document.getElementById("course-form").reset();
            document.getElementById("video-input-group").classList.remove("hidden");
            document.getElementById("btn-cancel").classList.add("hidden");
        }

        function openDeleteModal(id) {
            targetDeleteId = id;
            document.getElementById("delete-modal").classList.remove("hidden");
            document.getElementById("confirm-delete-btn").onclick = confirmDelete;
        }

        function closeDeleteModal() {
            document.getElementById("delete-modal").classList.add("hidden");
            targetDeleteId = null;
        }

        function confirmDelete() {
            if (!targetDeleteId) return;
            
            const btnConfirm = document.getElementById("confirm-delete-btn");
            btnConfirm.disabled = true;
            btnConfirm.textContent = "Menghapus...";

            fetch(`${API_URL}/${targetDeleteId}`, { method: 'DELETE' })
                .then(async res => {
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "Gagal menghapus");
                    return data;
                })
                .then(res => {
                    alert(res.message);
                    closeDeleteModal();
                    document.getElementById("detail-section").classList.add("hidden");
                    loadCourses();
                })
                .catch(err => {
                    alert("Gagal menghapus: " + err.message);
                })
                .finally(() => {
                    btnConfirm.disabled = false;
                    btnConfirm.textContent = "Ya, Hapus";
                });
        }

        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
