version: '3.8'

services:
  course-app:
    build: .
    container_name: bunny_course_streaming_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:16-alpine
    container_name: bunny_course_streaming_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123123
      POSTGRES_DB: course_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: